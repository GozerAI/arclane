name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gozerai-telemetry
        run: pip install "gozerai-telemetry @ git+https://github.com/chrisarseno/gozerai-telemetry.git"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify Alembic migration chain
        run: python -m alembic heads | grep -c head | xargs test 1 -eq
        env:
          ARCLANE_DATABASE_URL: "sqlite+aiosqlite:///ci_test.db"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov --cov-report=term-missing
