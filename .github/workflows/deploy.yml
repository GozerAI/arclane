name: Deploy to VPS

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gozerai-telemetry
        run: pip install "gozerai-telemetry @ git+https://github.com/chrisarseno/gozerai-telemetry.git"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/arclane/repo
            git pull origin main
            docker compose -f deploy/docker-compose.vps.yml build
            docker compose -f deploy/docker-compose.vps.yml up -d
            sleep 5
            docker exec arclane curl -sf http://localhost:8012/health || echo "Health check failed"
