services:
  arclane:
    build: ..
    container_name: arclane
    env_file: ../.env
    volumes:
      - arclane_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - webproxy
      - backend
      - repo_default

volumes:
  arclane_data:

networks:
  webproxy:
    external: true
  backend:
    external: true
  repo_default:
    external: true
