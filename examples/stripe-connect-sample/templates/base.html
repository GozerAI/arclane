<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Arclane{% endblock %} - Stripe Connect Sample</title>
    <style>
        :root {
            --bg: #07111c;
            --bg-soft: rgba(14, 24, 38, 0.9);
            --bg-card: rgba(10, 19, 31, 0.86);
            --border: rgba(128, 159, 196, 0.18);
            --border-strong: rgba(127, 171, 226, 0.34);
            --text: #edf4ff;
            --muted: #9db2cb;
            --accent: #4bb2ff;
            --accent-strong: #1d87ff;
            --success: #38d39f;
            --warning: #ffca5a;
            --error: #ff7d7d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(75, 178, 255, 0.12), transparent 28%),
                linear-gradient(180deg, #08131f 0%, #07111c 52%, #091522 100%);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-strong); text-decoration: underline; }
        .shell { width: min(960px, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0; }
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 0; margin-bottom: 2rem; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 1.15rem; letter-spacing: -0.03em; color: var(--text); }
        .logo span { color: var(--accent); }
        .badge {
            display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .badge-success { background: rgba(56, 211, 159, 0.15); color: var(--success); border: 1px solid rgba(56, 211, 159, 0.3); }
        .badge-warning { background: rgba(255, 202, 90, 0.15); color: var(--warning); border: 1px solid rgba(255, 202, 90, 0.3); }
        .badge-error { background: rgba(255, 125, 125, 0.15); color: var(--error); border: 1px solid rgba(255, 125, 125, 0.3); }
        .badge-muted { background: rgba(157, 178, 203, 0.1); color: var(--muted); border: 1px solid var(--border); }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;
        }
        .card:hover { border-color: var(--border-strong); }
        .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card p { color: var(--muted); font-size: 0.9rem; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; font-weight: 700; }
        .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .btn {
            display: inline-block; padding: 0.6rem 1.2rem; border-radius: 8px;
            font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer;
            text-decoration: none; transition: all 0.15s ease;
        }
        .btn-primary { background: var(--accent); color: #07111c; }
        .btn-primary:hover { background: var(--accent-strong); color: #fff; text-decoration: none; }
        .btn-success { background: var(--success); color: #07111c; }
        .btn-success:hover { opacity: 0.9; text-decoration: none; }
        .btn-outline {
            background: transparent; color: var(--accent);
            border: 1px solid var(--accent); padding: 0.55rem 1.15rem;
        }
        .btn-outline:hover { background: rgba(75, 178, 255, 0.1); text-decoration: none; }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block; font-size: 0.85rem; color: var(--muted);
            margin-bottom: 0.35rem; font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.6rem 0.8rem; border-radius: 8px;
            border: 1px solid var(--border); background: rgba(7, 17, 28, 0.6);
            color: var(--text); font-size: 0.9rem; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--accent);
        }
        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }
        .grid { display: grid; gap: 1rem; }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
        .status-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .status-row:last-child { border-bottom: none; }
        .status-label { color: var(--muted); font-size: 0.9rem; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .price { font-weight: 700; color: var(--success); }
        .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
        .back-link { display: inline-block; margin-bottom: 1.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="shell">
        <nav class="nav">
            <a href="/" class="logo"><span>arclane</span> connect</a>
            <span style="color: var(--muted); font-size: 0.8rem;">Stripe Connect Sample</span>
        </nav>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
